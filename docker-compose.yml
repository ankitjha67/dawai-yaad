version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: dawai_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-dawai}
      POSTGRES_PASSWORD: ${DB_PASS:-dawai_secret_2025}
      POSTGRES_DB: ${DB_NAME:-dawai_yaad}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dawai}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dawai_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: dawai_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-dawai_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_PASS:-dawai_minio_secret}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dawai_api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dawai_celery
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dawai_beat
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis
    command: celery -A app.tasks.celery_app beat --loglevel=info

volumes:
  pgdata:
  miniodata:
